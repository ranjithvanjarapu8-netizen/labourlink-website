<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profession Services | LabourLink</title>

    <link rel="stylesheet"
          href="profession-services.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="navbar">

        <button class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </button>

        <h1>Profession Services</h1>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ================= PROFESSION CARD ================= -->

        <section class="profession-card">

            <div class="profession-left">

                <div id="professionIcon" class="profession-icon">

                    ⚡

                </div>

            </div>

            <div class="profession-right">

                <h2 id="professionName">

                    Electrician

                </h2>

                <p class="profession-desc">

                    View all available services, estimated completion time
                    and standard LabourLink charges.

                </p>

                <div class="profession-info">

                    <div class="info-box">

                        <label>Average Daily Wage</label>

                        <span id="dailyWage">

                            ₹900 / Day

                        </span>

                    </div>

                    <div class="info-box">

                        <label>Total Services</label>

                        <span id="totalServices">

                            5

                        </span>

                    </div>

                </div>

            </div>

        </section>

        <!-- ================= SERVICES ================= -->

        <section>

            <h2 class="section-title">

                Available Services

            </h2>

            <div id="servicesContainer">

                <!-- Generated dynamically -->

                <!--

                <div class="service-card">

                    <div class="service-top">

                        <h3>Fan Installation</h3>

                        <span class="price">

                            ₹400

                        </span>

                    </div>

                    <div class="service-middle">

                        <span>

                            <i class="fa-regular fa-clock"></i>

                            1 Hour

                        </span>

                    </div>

                    <p>

                        Install ceiling fan.

                    </p>

                </div>

                -->

            </div>

        </section>

        <!-- ================= FOOTER ================= -->

        <section class="footer-card">

            <i class="fa-solid fa-circle-info"></i>

            <span>

                Prices shown are LabourLink recommended charges.
                Final charges may vary depending on work complexity,
                material cost and location.

            </span>

        </section>

    </main>

    <script src="profession-services.js"></script>

</body>

</html>
