<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LabourLink - Register</title>

    <link rel="stylesheet" href="register.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>Join LabourLink</h1>

        <p>
            Create your account and connect with thousands of workers and employers.
        </p>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <p>Register to continue</p>

            <form id="registerForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="text"
                    id="phone"
                    placeholder="Mobile Number"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <button type="submit">
                    Create Account
                </button>

            </form>

            <div class="login">

                Already have an account?

                <span id="loginBtn">
                    Login
                </span>

            </div>

        </div>

    </div>

</div>

<!-- OTP Popup -->

<div id="otpPopup" class="otp-popup">

    <div class="otp-card">

        <h2>Verify Mobile Number</h2>

        <p id="otpText">
            OTP has been sent
        </p>

        <input
            type="text"
            id="otp"
            maxlength="6"
            placeholder="Enter OTP"
        >

        <button id="verifyOtpBtn">
            Verify OTP
        </button>

        <p id="resendOtp">
            Resend OTP
        </p>

    </div>

</div>

<!-- Firebase reCAPTCHA -->

<div id="recaptcha-container"></div>
